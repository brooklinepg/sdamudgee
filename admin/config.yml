backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "_data/content.json"
        format: json
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Headline Line 1", name: "headline1", widget: "string" }
              - { label: "Headline Line 2 (italic)", name: "headline2", widget: "string" }
              - { label: "Headline Line 3", name: "headline3", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }
              - { label: "Coming Soon Badge Text", name: "badge", widget: "string" }

          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph 1", name: "para1", widget: "text" }
              - { label: "Paragraph 2", name: "para2", widget: "text" }
              - { label: "Paragraph 3", name: "para3", widget: "text" }

          - label: "Location Section"
            name: "location"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro Paragraph", name: "intro", widget: "text" }
              - label: "Location Points"
                name: "points"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }

          - label: "Contact & CTA"
            name: "contact"
            widget: "object"
            fields:
              - { label: "CTA Heading", name: "heading", widget: "string" }
              - { label: "CTA Subheading", name: "subheading", widget: "text" }
              - { label: "Contact Note", name: "note", widget: "string" }
              - { label: "Email Address", name: "email", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Website", name: "website", widget: "string" }

          - label: "Trust Section"
            name: "trust"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }
              - label: "Trust Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Icon (emoji)", name: "icon", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }

          - label: "Coming Soon Bar"
            name: "comingsoon"
            widget: "object"
            fields:
              - { label: "Bar Text", name: "text", widget: "string" }
